name: Process Layout Submission

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'layout-submission')
    runs-on: ubuntu-latest
    outputs:
      layout_id: ${{ steps.parse.outputs.layout_id }}
      layout_name: ${{ steps.parse.outputs.layout_name }}
      layout_author: ${{ steps.parse.outputs.layout_author }}
      layout_tags: ${{ steps.parse.outputs.layout_tags }}
      issue_number: ${{ steps.parse.outputs.issue_number }}
      pr_number: ${{ steps.create_pr.outputs.pr_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue and create layout
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Parse metadata from issue body
            const nameMatch = body.match(/\*\*Name:\*\*\s*(.+)/);
            const authorMatch = body.match(/\*\*Author:\*\*\s*(.+)/);
            const descMatch = body.match(/\*\*Description:\*\*\s*(.+)/);
            const tagsMatch = body.match(/\*\*Tags:\*\*\s*(.+)/);
            const jsonMatch = body.match(/```json\s*([\s\S]*?)```/);

            if (!nameMatch || !jsonMatch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ Could not parse layout submission. Make sure the issue contains **Name:** and a ```json``` code block with the layout data.'
              });
              return;
            }

            const layoutName = nameMatch[1].trim();
            const author = authorMatch ? authorMatch[1].trim() : 'anonymous';
            const description = descMatch ? descMatch[1].trim() : '';
            const tags = tagsMatch ? tagsMatch[1].split(',').map(t => t.trim().toLowerCase()).filter(Boolean) : [];

            // Validate JSON
            let layout;
            try {
              layout = JSON.parse(jsonMatch[1].trim());
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ Invalid JSON in layout data. Please check the format and try again.'
              });
              return;
            }

            if (layout.version !== 1 || !Array.isArray(layout.tiles)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ Layout must have `version: 1` and a `tiles` array.'
              });
              return;
            }

            // Generate kebab-case ID
            const id = layoutName.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
            if (!id) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ Could not generate a valid ID from the layout name.'
              });
              return;
            }

            // Check if layout already exists
            const fs = require('fs');
            const path = require('path');
            const layoutDir = path.join('layouts', id);
            if (fs.existsSync(layoutDir)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ A layout with the ID \`${id}\` already exists. Please choose a different name.`
              });
              return;
            }

            // Strip pets if present
            delete layout.pets;

            // Create layout files
            fs.mkdirSync(layoutDir, { recursive: true });
            fs.writeFileSync(
              path.join(layoutDir, 'layout.json'),
              JSON.stringify(layout, null, 2) + '\n'
            );
            fs.writeFileSync(
              path.join(layoutDir, 'metadata.json'),
              JSON.stringify({
                name: layoutName,
                author,
                description,
                tags,
                createdAt: new Date().toISOString().slice(0, 10),
              }, null, 2) + '\n'
            );

            // Set outputs for downstream jobs
            core.setOutput('layout_id', id);
            core.setOutput('layout_name', layoutName);
            core.setOutput('layout_author', author);
            core.setOutput('layout_tags', tags.join(', '));
            core.setOutput('issue_number', String(issue.number));

      - name: Create branch and push
        if: steps.parse.outputs.layout_id != ''
        run: |
          BRANCH="layout/${{ steps.parse.outputs.layout_id }}-${{ steps.parse.outputs.issue_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "layouts/${{ steps.parse.outputs.layout_id }}"
          git commit -m "feat: add layout '${{ steps.parse.outputs.layout_name }}' (#${{ steps.parse.outputs.issue_number }})"
          git push origin "$BRANCH"

      - name: Open PR and comment on issue
        id: create_pr
        if: steps.parse.outputs.layout_id != ''
        uses: actions/github-script@v7
        with:
          script: |
            const layoutId = '${{ steps.parse.outputs.layout_id }}';
            const layoutName = '${{ steps.parse.outputs.layout_name }}';
            const layoutAuthor = '${{ steps.parse.outputs.layout_author }}';
            const layoutTags = '${{ steps.parse.outputs.layout_tags }}';
            const issueNumber = Number('${{ steps.parse.outputs.issue_number }}');

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Add layout: ${layoutName}`,
              head: `layout/${layoutId}-${issueNumber}`,
              base: 'main',
              body: [
                `Adds community layout **${layoutName}**.`,
                '',
                `Closes #${issueNumber}`,
                '',
                '_Auto-generated from issue submission._',
                '',
                '---',
                '🖼️ _Preview screenshot will be added shortly..._',
              ].join('\n'),
            });

            // Comment on issue with metadata so user can verify parsing
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                `✅ Layout received! PR created: #${pr.data.number}`,
                '',
                `**Layout:** ${layoutName}`,
                `**Author:** ${layoutAuthor}`,
                layoutTags ? `**Tags:** ${layoutTags}` : '',
                '',
                '🖼️ _Generating preview screenshot... this takes about 2-3 minutes._',
              ].filter(Boolean).join('\n'),
            });

            core.setOutput('pr_number', String(pr.data.number));

      - name: Handle process failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: '❌ Processing failed. A layout with this name may already exist, or there was a server error. Please try a different layout name or contact a maintainer.',
            });

  preview:
    needs: process
    if: needs.process.outputs.layout_id != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: layout/${{ needs.process.outputs.layout_id }}-${{ needs.process.outputs.issue_number }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Clone and build pixel-office standalone server
      - name: Clone pixel-office
        env:
          PIXEL_OFFICE_TOKEN: ${{ secrets.PIXEL_OFFICE_TOKEN }}
        run: |
          if [ -n "$PIXEL_OFFICE_TOKEN" ]; then
            git clone --depth 1 --branch feat/pets-community-monetization "https://x-access-token:${PIXEL_OFFICE_TOKEN}@github.com/fedevgonzalez/pixel-office.git" /tmp/pixel-office
          else
            git clone --depth 1 --branch feat/pets-community-monetization https://github.com/fedevgonzalez/pixel-office.git /tmp/pixel-office
          fi

      - name: Build pixel-office
        run: |
          cd /tmp/pixel-office
          npm ci
          cd webview-ui && npm ci && cd ..
          npm run build

      - name: Install Playwright
        run: |
          cd /tmp/pixel-office
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Take screenshot
        run: |
          LAYOUT_ID="${{ needs.process.outputs.layout_id }}"
          LAYOUT_FILE="$(pwd)/layouts/${LAYOUT_ID}/layout.json"
          SCREENSHOT_FILE="$(pwd)/layouts/${LAYOUT_ID}/preview.png"

          # Start standalone server in background
          cd /tmp/pixel-office
          NO_SCAN=1 node standalone-server.js &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:3300 > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Run screenshot script
          node -e "
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1200, height: 900 } });
            await page.goto('http://localhost:3300/?screenshot');
            await page.waitForSelector('[data-screenshot-ready]', { timeout: 15000 });
            await page.waitForTimeout(1000);

            // Import layout via WebSocket — track success to detect silent failures
            const layout = JSON.parse(fs.readFileSync('${LAYOUT_FILE}', 'utf-8'));
            const imported = await page.evaluate((layoutData) => {
              return new Promise((resolve) => {
                let loaded = false;
                const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
                const ws = new WebSocket(proto + '//' + location.host);
                ws.onopen = () => {
                  ws.send(JSON.stringify({ type: 'importGalleryLayout', layout: layoutData }));
                  ws.addEventListener('message', (e) => {
                    try {
                      const msg = JSON.parse(e.data);
                      if (msg.type === 'layoutLoaded') { loaded = true; resolve(true); }
                    } catch {}
                  });
                  setTimeout(() => resolve(loaded), 5000);
                };
                setTimeout(() => resolve(loaded), 8000);
              });
            }, layout);

            if (!imported) {
              console.error('Layout import timed out — screenshot may show wrong layout');
              process.exit(1);
            }

            // Wait for render to settle (sprite cache, floor/wall tiles)
            await page.waitForTimeout(2500);

            const canvas = page.locator('canvas').first();
            await canvas.screenshot({ path: '${SCREENSHOT_FILE}' });
            console.log('Screenshot saved');
            await browser.close();
          })();
          "

          kill $SERVER_PID 2>/dev/null || true

      - name: Commit preview to branch
        run: |
          LAYOUT_ID="${{ needs.process.outputs.layout_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "layouts/${LAYOUT_ID}/preview.png"
          git diff --cached --quiet || git commit -m "chore: add preview screenshot for ${LAYOUT_ID}"
          git push

      - name: Post preview on issue and update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const layoutId = '${{ needs.process.outputs.layout_id }}';
            const layoutName = '${{ needs.process.outputs.layout_name }}';
            const issueNumber = Number('${{ needs.process.outputs.issue_number }}');
            const prNumber = Number('${{ needs.process.outputs.pr_number }}');
            const branch = `layout/${layoutId}-${issueNumber}`;

            // Use blob URL with ?raw=true — works for anyone with repo access
            // (raw.githubusercontent.com doesn't work for private repos)
            const previewUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/${branch}/layouts/${layoutId}/preview.png?raw=true`;

            // Post new comment on issue with preview (new comment = notification)
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `### 🖼️ Preview\n\n![${layoutName}](${previewUrl})\n\nA maintainer will review and merge it. Once merged, your layout will appear in the community gallery.`,
            });

            // Update PR description to include preview image (visible without scrolling)
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const updatedBody = pr.body.replace(
              /---\n🖼️ _Preview screenshot will be added shortly\.\.\._/,
              `---\n### 🖼️ Preview\n\n![${layoutName}](${previewUrl})`
            );

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: updatedBody,
            });

      - name: Post failure notice
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ needs.process.outputs.issue_number }}');
            const prNumber = Number('${{ needs.process.outputs.pr_number }}');

            // Always post visible failure — never fail silently
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                `⚠️ Preview screenshot could not be generated automatically.`,
                '',
                `Your layout was accepted and PR #${prNumber} is open.`,
                'A maintainer will review and merge it. Once merged, your layout will appear in the community gallery.',
              ].join('\n'),
            });
